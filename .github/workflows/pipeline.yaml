name: Assignment 6 pipeline

on:
  push:
    branches:
      - main
      - '*'

jobs:
  linter:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Run linter
        run: echo "Linting passed!"

  train:
    needs: linter
    runs-on: ubuntu-latest

    if: >
      github.ref == 'refs/heads/main' &&
      contains(github.event.head_commit.message, '[run-train]')

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run training
        run: python train.py

      - name: Save error logs
        if: failure()
        run: echo "Training failed. Check logs." > error_logs.txt

      - name: Upload logs
        if: failure()
        uses: actions/upload-artifact@v3
        with:
          name: error-logs
          path: error_logs.txt

      - name: Cleanup resources
        if: always()
        run: echo "Cleaning up temporary cloud volumes..."